services:
  db:
    image: mariadb:10.11
    command: ["--lower-case-table-names=1"]
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-quanlidatphong1}
      MARIADB_USER: ${DB_USER:-tourist_app}
      MARIADB_PASSWORD: ${DB_PASSWORD:-change_me}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_root_password}
    ports:
      - "${DB_PORT_FORWARD:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - "./resources/quanlidatphong (8).sql:/docker-entrypoint-initdb.d/01-schema.sql:ro"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-quanlidatphong1}
      DB_USER: ${DB_USER:-tourist_app}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      SESSION_SECRET: ${SESSION_SECRET:-change_this_session_secret}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      VNP_TMNCODE: ${VNP_TMNCODE:-}
      VNP_HASHSECRET: ${VNP_HASHSECRET:-}
      VNP_URL: ${VNP_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNP_RETURNURL: ${VNP_RETURNURL:-http://localhost:3000/vnpay/return}
      VNP_IPNURL: ${VNP_IPNURL:-http://localhost:3000/vnpay/ipn}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - uploaded_images:/app/src/public/images
      - generated_reports:/app/src/public/reports
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  db_data:
  uploaded_images:
  generated_reports:
